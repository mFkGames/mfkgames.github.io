    <style>
        :root {
            --cream: #f0ece4;
            --dark: #0f0f1e;
            --accent: #c8222f;
            --accent2: #2db5ac;
            --accent3: #f5d832;
            --border: #cec4b5;
            --text: #1a1a1a;
            --muted: #444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--cream);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        /* ── LANGUAGE SELECTOR ── */
        .lang-bar {
            position: fixed;
            top: 0;
            right: 0;
            z-index: 1000;
            padding: 14px 20px;
        }

        .lang-wrapper {
            position: relative;
            display: inline-block;
        }

        .lang-toggle {
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            background: transparent;
            color: rgba(26,26,26,0.45);
            border: 1.5px solid rgba(26,26,26,0.25);
            padding: 9px 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 7px;
            transition: color 0.2s, border-color 0.2s, transform 0.15s, box-shadow 0.15s;
            user-select: none;
            white-space: nowrap;
        }

        .lang-toggle .globe {
            font-size: 14px;
            line-height: 1;
        }

        .lang-toggle:hover {
            color: var(--dark);
            border-color: var(--dark);
            transform: translate(-2px, -2px);
            box-shadow: 3px 3px 0 var(--dark);
        }

        .lang-dropdown {
            position: absolute;
            top: calc(100% + 4px);
            right: 0;
            background: var(--dark);
            border: 2px solid var(--accent3);
            min-width: 170px;
            display: none;
            flex-direction: column;
            z-index: 999;
            box-shadow: 6px 6px 0 rgba(0,0,0,0.35);
        }

        .lang-dropdown.open {
            display: flex;
        }

        .lang-option {
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            padding: 11px 18px;
            color: #ccc;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.07);
            transition: background 0.1s, color 0.1s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .lang-option:last-child { border-bottom: none; }

        .lang-option:hover,
        .lang-option.active {
            background: rgba(245,216,50,0.14);
            color: var(--accent3);
        }

        .lang-option .flag { font-size: 16px; }

        /* ── HERO ── */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px 40px;
            position: relative;
            max-width: 1100px;
            margin: 0 auto;
            z-index: 1;
        }

        .pixel-badge {
            display: inline-block;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            color: var(--accent);
            border: 2px solid var(--accent);
            padding: 9px 16px;
            margin-bottom: 32px;
            animation: blink 1.4s step-end infinite;
            width: fit-content;
        }

        @keyframes blink {
            50% { border-color: transparent; color: transparent; }
        }

        .hero-name {
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(26px, 4.5vw, 52px);
            line-height: 1.5;
            color: var(--dark);
            margin-bottom: 18px;
            animation: fadeUp 0.8s ease both;
        }

        .hero-name span { color: var(--accent); }

        .hero-sub {
            font-size: 20px;
            font-weight: 400;
            color: var(--muted);
            margin-bottom: 40px;
            animation: fadeUp 0.8s 0.1s ease both;
        }

        .hero-desc {
            font-size: 17px;
            line-height: 1.85;
            max-width: 520px;
            color: var(--text);
            animation: fadeUp 0.8s 0.2s ease both;
            margin-bottom: 48px;
        }

        .hero-links {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            animation: fadeUp 0.8s 0.3s ease both;
        }

        .btn {
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            padding: 15px 22px;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            line-height: 1;
            border: 2px solid var(--dark);
        }

        .btn-primary {
            background: var(--dark);
            color: var(--cream);
        }

        .btn-outline {
            background: transparent;
            color: var(--dark);
        }

        .btn:hover {
            transform: translate(-3px, -3px);
            box-shadow: 5px 5px 0 var(--dark);
        }

        .btn-primary:hover {
            box-shadow: 5px 5px 0 var(--accent);
        }

        .btn-icon {
            font-size: 15px;
            line-height: 1;
        }

        /* ── PIXEL DECO ── */
        .pixel-deco {
            position: absolute;
            right: 50px;
            top: 50%;
            transform: translateY(-50%);
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 14px;
            opacity: 0.55;
            pointer-events: none;
        }

        .pixel-deco span {
            width: 26px;
            height: 26px;
            display: block;
            animation: pixelFade 3s ease-in-out infinite;
        }

        .pixel-deco span:nth-child(8n+1)  { background: #a01820; animation-delay: 0.0s; }
        .pixel-deco span:nth-child(8n+2)  { background: #0a0a16; animation-delay: 0.2s; }
        .pixel-deco span:nth-child(8n+3)  { background: #1e8a84; animation-delay: 0.5s; }
        .pixel-deco span:nth-child(8n+4)  { background: #c9ae14; animation-delay: 0.8s; }
        .pixel-deco span:nth-child(8n+5)  { background: #a01820; animation-delay: 1.0s; }
        .pixel-deco span:nth-child(8n+6)  { background: #1e8a84; animation-delay: 1.3s; }
        .pixel-deco span:nth-child(8n+7)  { background: #0a0a16; animation-delay: 1.6s; }
        .pixel-deco span:nth-child(8n+8)  { background: #c9ae14; animation-delay: 1.9s; }

        @keyframes pixelFade {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.2; transform: scale(0.6); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        footer {
            text-align: center;
            padding: 20px;
            font-family: 'Press Start 2P', monospace;
            font-size: 7px;
            color: rgba(26,26,26,0.3);
            letter-spacing: 0.5px;
            position: relative;
            z-index: 1;
            white-space: nowrap;
            overflow-x: auto;
        }

        footer span { color: rgba(26,26,26,0.5); }
        footer a {
            color: rgba(26,26,26,0.5);
            text-decoration: none;
            transition: color 0.2s;
        }
        footer a:hover {
            color: var(--accent);
        }

        @media (max-width: 768px) {
            .pixel-deco { display: none; }
        }

        @media (max-width: 600px) {
            .hero { padding: 80px 24px 40px; }
            .lang-bar { padding: 12px 14px; }
        }
    </style>
